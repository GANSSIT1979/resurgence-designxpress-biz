version: "3.9"

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      PRISMA_DB_PROVIDER: postgresql
      DATABASE_URL: postgresql://postgres:postgres@db:5432/resurgence?schema=public
      AUTH_SECRET: change-me
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resurgence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - resurgence_pg:/var/lib/postgresql/data

volumes:
  resurgence_pg:
