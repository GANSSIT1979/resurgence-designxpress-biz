name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PRISMA_DB_PROVIDER: sqlite
      DATABASE_URL: file:./dev.db
      JWT_SECRET: ci-build-jwt-secret-0123456789abcdef
      OTP_DELIVERY_MODE: demo
      NEXT_TELEMETRY_DISABLED: "1"
      PRISMA_HIDE_UPDATE_MESSAGE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate --schema prisma/schema.generated.prisma

      - name: Sync local SQLite schema
        run: npm run db:push

      - name: Type check
        run: npx tsc --noEmit --pretty false

      - name: Build application
        run: npm run build
